services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vaccichain

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - EVENT_POLL_INTERVAL_MS=${EVENT_POLL_INTERVAL_MS:-15000}
      - DATABASE_PATH=/data/vaccichain.db
    volumes:
      - vaccichain_db:/data
    depends_on:
      - python-service
    networks:
      - vaccichain

  python-service:
    build: ./python-service
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:4000
      - ANOMALY_THRESHOLD=${ANOMALY_THRESHOLD:-50}
    networks:
      - vaccichain

networks:
  vaccichain:
    driver: bridge

volumes:
  vaccichain_db:
